apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
type: Opaque
stringData:
  {{- if .Values.postgres.embedded }}
  databaseUrl: "postgres://postgres:postgres@{{ .Release.Name }}-postgres:5432/ensemble"
  {{- else }}
  databaseUrl: "{{ required "postgres.url is required when postgres.embedded is false" .Values.postgres.url }}"
  {{- end }}
  {{- if .Values.redis.embedded }}
  redisUrl: "redis://{{ .Release.Name }}-redis:6379"
  {{- else }}
  redisUrl: "{{ required "redis.url is required when redis.embedded is false" .Values.redis.url }}"
  {{- end }}
